<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Adventures of Alex — Palm Island Mission</title>
  <link rel="icon" href="favicon.ico">
  <meta property="og:title" content="The Adventures of Alex — Palm Island Mission">
  <meta property="og:description" content="Play a classic 1996 Israeli DOS adventure game in your browser">
  <meta property="og:image" content="https://elazarg.github.io/alex-palm-island/alex.jpg">
  <meta property="og:url" content="https://elazarg.github.io/alex-palm-island/">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #dos { width: 100%; height: 100%; cursor: none; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #f0c040; font-family: sans-serif; font-size: 1.2rem; text-align: center; }
    #loading .bar { width: 300px; height: 8px; background: #333; border-radius: 4px; margin-top: 1rem; }
    #loading .fill { height: 100%; background: #f0c040; border-radius: 4px; transition: width 0.3s; }
  </style>
</head>
<body>
  <div id="loading">
    Loading game data...
    <div class="bar"><div class="fill" id="progress" style="width: 0%"></div></div>
    <div id="pct" style="margin-top: 0.5rem; font-size: 0.9rem; color: #aaa;">0%</div>
  </div>
  <div id="dos"></div>
  <script>
    const JSDOS_URL = "https://pub-fefab33b6ba44b7086f44da81b232696.r2.dev/alex-compact.jsdos";

    (async () => {
      const progress = document.getElementById("progress");
      const pct = document.getElementById("pct");

      const res = await fetch(JSDOS_URL);
      const total = +res.headers.get("Content-Length") || 0;
      const reader = res.body.getReader();
      const chunks = [];
      let loaded = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total > 0) {
          const pctVal = Math.round((loaded / total) * 100);
          progress.style.width = pctVal + "%";
          pct.textContent = pctVal + "%";
        }
      }

      const blob = new Blob(chunks, { type: "application/octet-stream" });
      const url = URL.createObjectURL(blob);

      document.getElementById("loading").remove();
      Dos(document.getElementById("dos"), {
        url: url,
        autoStart: true,
        backend: "dosboxX",
      });
    })();
  </script>
</body>
</html>
