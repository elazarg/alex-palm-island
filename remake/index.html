<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alex in Palm Island</title>
  <style>
    :root {
      --canvas-offset-x: 24px;
    }

    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #viewport {
      position: relative;
      width: min(100vw, calc(100vh * 1.6));
      aspect-ratio: 320 / 200;
      transform: translateX(var(--canvas-offset-x));
    }
    #screen {
      display: block;
      position: absolute;
      inset: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 100%;
      height: 100%;
      cursor: none;
    }
    #overlay {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="viewport">
    <canvas id="screen"></canvas>
    <canvas id="overlay"></canvas>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
