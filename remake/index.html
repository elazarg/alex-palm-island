<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alex in Palm Island</title>
  <style>
    :root {
      --canvas-offset-x: 24px;
    }

    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      cursor: none;
      transform: translateX(var(--canvas-offset-x));
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>
  <script type="module" src="src/main.js"></script>
</body>
</html>
